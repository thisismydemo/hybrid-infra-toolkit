name: "HVLab 02b — Post-Bootstrap (ISOs + Verify)"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["HVLab 02 — Bootstrap Host VM"]
    types: [completed]
    branches: [main]

env:
  SUBSCRIPTION_ID: "00cd4357-ed45-4efb-bee0-10c467ff994b"
  RESOURCE_GROUP:  "rg-hvlab-mms26-eus-01"

jobs:
  post-bootstrap:
    name: Post-Bootstrap (ISOs + Verify)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, hvlab-host01]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "Download evaluation ISOs (WS2022, WS2025, SQL 2022 Dev)"
        shell: powershell
        run: src/deployments/powershell-azurecli/deploy/00-download-isos.ps1
        continue-on-error: true

      - name: "Verify Hyper-V and networking configuration"
        shell: powershell
        run: |
          Write-Host "=== Hyper-V ==="
          (Get-WindowsFeature -Name Hyper-V).InstallState
          Write-Host "=== vSwitches ==="
          Get-VMSwitch | Format-Table Name,SwitchType -AutoSize
          Write-Host "=== WinNAT ==="
          Get-NetNat | Format-Table Name,InternalIPInterfaceAddressPrefix -AutoSize
          Write-Host "=== ISO folder ==="
          if (Test-Path 'D:\HyperVStorage\ISOs') { Get-ChildItem 'D:\HyperVStorage\ISOs' | Select-Object Name,@{n='SizeGB';e={[math]::Round($_.Length/1GB,2)}} } else { Write-Host 'ISO folder not present yet' }
        continue-on-error: true

      - name: Summary
        shell: powershell
        run: |
          "## Post-Bootstrap Complete" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- ISOs downloading to D:\HyperVStorage\ISOs\" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- Hyper-V and networking verified" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "**Next step:** Run HVLab 03 — Deploy Nested VMs" | Out-File $env:GITHUB_STEP_SUMMARY -Append
