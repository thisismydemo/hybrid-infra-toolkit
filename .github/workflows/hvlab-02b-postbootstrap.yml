name: "HVLab 02b — Post-Bootstrap (ISOs + Arc)"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["HVLab 02 — Bootstrap Host VM"]
    types: [completed]
    branches: [main]

env:
  SUBSCRIPTION_ID: "00cd4357-ed45-4efb-bee0-10c467ff994b"
  RESOURCE_GROUP:  "rg-hvlab-mms26-eus-01"

jobs:
  post-bootstrap:
    name: Post-Bootstrap (ISOs + Arc)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, hvlab-host]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "Download evaluation ISOs (WS2022, WS2025, SQL 2022 Dev)"
        shell: pwsh
        run: src/deployments/powershell-azurecli/deploy/00-download-isos.ps1
        continue-on-error: true

      - name: "Install Azure Arc Connected Machine Agent"
        shell: pwsh
        run: |
          src/deployments/powershell-azurecli/deploy/07-install-arc.ps1 `
            -SubscriptionId "${{ env.SUBSCRIPTION_ID }}" `
            -ResourceGroup  "${{ env.RESOURCE_GROUP }}"
        continue-on-error: true

      - name: Summary
        shell: pwsh
        run: |
          "## Post-Bootstrap Complete" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- ISOs downloading to D:\HyperVStorage\ISOs\" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- Azure Arc agent installed" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "**Next step:** Run HVLab 03 — Deploy Nested VMs" | Out-File $env:GITHUB_STEP_SUMMARY -Append
