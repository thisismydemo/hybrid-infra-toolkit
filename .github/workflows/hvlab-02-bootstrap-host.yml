name: "HVLab 02 — Bootstrap Host VM"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["HVLab 01 — Deploy Azure Infrastructure"]
    types: [completed]
    branches: [main]

env:
  SUBSCRIPTION_ID: "00cd4357-ed45-4efb-bee0-10c467ff994b"
  RESOURCE_GROUP:  "rg-hvlab-mms26-eus-01"
  VM_NAME:         "vm-hvlab-host01-eus-01"
  KV_NAME:         "kv-tplabs-platform"
  KV_SUBSCRIPTION: "2caa0b8a-a1d6-4f0c-8c03-861787b8315c"

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Bootstrap Host VM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      # ── Phase 1: Install Windows Features ──────────────────────────────────
      - name: "Phase 1 — Install Windows features (will reboot if needed)"
        id: phase1
        run: |
          SCRIPT=$(cat src/deployments/powershell-azurecli/deploy/04-bootstrap-phase1.ps1 | base64 -w 0)
          OUTPUT=$(az vm run-command invoke \
            --subscription "$SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunPowerShellScript \
            --scripts "powershell -EncodedCommand $SCRIPT" \
            --output json)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q 'Phase 1 skipped'; then
            echo "needs_reboot=false" >> $GITHUB_OUTPUT
            echo "Phase 1 already done — skipping reboot wait."
          else
            echo "needs_reboot=true" >> $GITHUB_OUTPUT
            echo "Phase 1 ran — VM will reboot."
          fi

      - name: "Restart VM to activate Windows features"
        if: steps.phase1.outputs.needs_reboot == 'true'
        run: |
          echo "Issuing VM restart..."
          az vm restart \
            --subscription "$SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME"
          echo "VM restart complete."

      - name: "Wait for VM agent to be ready"
        if: steps.phase1.outputs.needs_reboot == 'true'
        run: |
          echo "Waiting 90 seconds for VM agent to come back online..."
          sleep 90
          for i in 1 2 3 4 5; do
            STATUS=$(az vm get-instance-view \
              --subscription "$SUBSCRIPTION_ID" \
              --resource-group "$RESOURCE_GROUP" \
              --name "$VM_NAME" \
              --query "instanceView.vmAgent.statuses[0].displayStatus" -o tsv 2>/dev/null || echo "unknown")
            echo "VM agent status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then
              echo "VM agent is ready."
              break
            fi
            sleep 30
          done

      # ── Phase 2: Configure Hyper-V ─────────────────────────────────────────
      - name: "Phase 2 — Configure Hyper-V, vSwitches, and WinNAT"
        id: phase2
        run: |
          OUTPUT=$(az vm run-command invoke \
            --subscription "$SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunPowerShellScript \
            --scripts @src/deployments/powershell-azurecli/deploy/05-bootstrap-phase2.ps1 \
            --output json)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q 'Phase 2 skipped'; then
            echo "Phase 2 already done — skipping settle wait."
            echo "needs_settle=false" >> $GITHUB_OUTPUT
          else
            echo "Phase 2 complete."
            echo "needs_settle=true" >> $GITHUB_OUTPUT
          fi

      - name: "Wait for host services to settle"
        if: steps.phase2.outputs.needs_settle == 'true'
        run: sleep 120

      # ── Phase 3: Download ISOs ─────────────────────────────────────────────
      - name: "Phase 3 — Download evaluation ISOs"
        run: |
          az vm run-command invoke \
            --subscription "$SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunPowerShellScript \
            --scripts @src/deployments/powershell-azurecli/deploy/00-download-isos.ps1 \
            --output json || true
          echo "ISO download script sent (runs async on VM)."

      # ── Phase 4: Install GitHub Actions self-hosted runner ────────────────
      - name: "Phase 4 — Install GitHub Actions self-hosted runner"
        run: |
          EXISTING_RUNNER=$(az vm run-command invoke \
            --subscription "$SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunPowerShellScript \
            --scripts "if (Get-Service -Name 'actions.runner.*' -ErrorAction SilentlyContinue) { Write-Host 'RUNNER_PRESENT' }" \
            --query "value[0].message" -o tsv 2>/dev/null || true)
          if echo "$EXISTING_RUNNER" | grep -q 'RUNNER_PRESENT'; then
            echo "Runner already installed on VM — skipping registration."
            exit 0
          fi

          # Try repo secret PAT first, then Key Vault PAT, then fall back to GITHUB_TOKEN.
          PAT="$GH_PAT"
          if [ -z "$PAT" ]; then
            PAT=$(az keyvault secret show \
              --subscription "$KV_SUBSCRIPTION" \
              --vault-name "$KV_NAME" \
              --name "hvlab-github-pat-full" \
              --query value -o tsv 2>/dev/null || true)
          fi

          if [ -n "$PAT" ]; then
            REG_TOKEN=$(GH_TOKEN="$PAT" gh api -X POST "/repos/thisismydemo/hybrid-infra-toolkit/actions/runners/registration-token" --jq .token)
          else
            REG_TOKEN=$(gh api -X POST "/repos/thisismydemo/hybrid-infra-toolkit/actions/runners/registration-token" --jq .token)
          fi
          if [ -z "$REG_TOKEN" ]; then
            echo "ERROR: Failed to get runner registration token" && exit 1
          fi
          az vm run-command invoke \
            --subscription "$SUBSCRIPTION_ID" \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunPowerShellScript \
            --parameters "RegistrationToken=$REG_TOKEN" \
            --scripts @src/deployments/powershell-azurecli/deploy/06-bootstrap-phase4-runner.ps1 \
            --output json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Summary
        run: |
          echo "## ✅ Host VM Bootstrap Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 1: Windows features installed (with reboot)" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 2: Hyper-V, vSwitches, and WinNAT configured" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 3: Evaluation ISO downloads initiated" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 4: GitHub Actions self-hosted runner installed" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Run **HVLab 02b / 03 — Deploy Nested VMs**" >> $GITHUB_STEP_SUMMARY
