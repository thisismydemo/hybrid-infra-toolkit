name: "HVLab 03 — Deploy Nested VMs"

on:
  workflow_dispatch:
  push:
    paths:
      - 'triggers/hvlab-03.trigger'
  workflow_run:
    workflows: ["HVLab 02b — Post-Bootstrap (ISOs + Arc)"]
    types: [completed]

jobs:
  deploy-nested-vms:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    name: Create all nested VMs
    runs-on: [self-hosted, hvlab-host01]
    steps:
      - uses: actions/checkout@v4

      - name: "Create forest root DC (hvdc01 — azrl.mgmt)"
        shell: powershell
        run: src/deployments/powershell-azurecli/nested-vms/01-create-dc.ps1

      - name: "Create iSCSI target server (hviscsi01)"
        shell: powershell
        run: src/deployments/powershell-azurecli/nested-vms/02-create-iscsi.ps1

      - name: "Create Hyper-V cluster nodes (hvnode01-04)"
        shell: powershell
        run: src/deployments/powershell-azurecli/nested-vms/03-create-cluster-nodes.ps1

      - name: "Create WAC vmode server (hvwac01 — WS2025)"
        shell: powershell
        run: src/deployments/powershell-azurecli/nested-vms/04-create-wac-vmode.ps1

      - name: "Create SCVMM server (hvscvmm01)"
        shell: powershell
        run: src/deployments/powershell-azurecli/nested-vms/05-create-scvmm.ps1

      - name: Summary
        shell: powershell
        run: |
          $vms = Get-VM | Select-Object Name, State, @{N='MemoryGB';E={[math]::Round($_.MemoryAssigned/1GB,1)}}, ProcessorCount
          $vms | Format-Table | Out-String | Write-Host
          "## ✅ Nested VMs Created" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| VM | State | Memory | vCPU |" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "|---|---|---|---|" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          foreach ($vm in $vms) {
            "| $($vm.Name) | $($vm.State) | $($vm.MemoryGB) GB | $($vm.ProcessorCount) |" |
              Out-File $env:GITHUB_STEP_SUMMARY -Append
          }
          "`n**Next step:** Run **HVLab 04 — Configure Cluster**" |
            Out-File $env:GITHUB_STEP_SUMMARY -Append
