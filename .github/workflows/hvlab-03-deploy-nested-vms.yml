name: "HVLab 03 — Deploy Nested VMs"

on:
  workflow_dispatch:
  push:
    paths:
      - 'triggers/hvlab-03.trigger'
  workflow_run:
    workflows: ["HVLab 02b — Post-Bootstrap (ISOs + Arc)"]
    types: [completed]

jobs:
  deploy-nested-vms:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    name: Create all nested VMs
    runs-on: [self-hosted, hvlab-host01]
    steps:
      - uses: actions/checkout@v4

      - name: "Ensure runner has Hyper-V admin rights"
        shell: powershell
        run: |
          Write-Host "Runner identity: $([System.Security.Principal.WindowsIdentity]::GetCurrent().Name)"
          $isAdmin = ([Security.Principal.WindowsPrincipal][Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          Write-Host "Is admin: $isAdmin"
          # Test if we can create a scheduled task as SYSTEM (required for Hyper-V ops)
          try {
            $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-Command exit 0"
            $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -RunLevel Highest
            Register-ScheduledTask -TaskName "HVLab-SysCheck" -Action $action -Principal $principal -Force | Out-Null
            Unregister-ScheduledTask -TaskName "HVLab-SysCheck" -Confirm:$false
            Write-Host "Scheduled task as SYSTEM: OK"
          } catch {
            Write-Host "Scheduled task as SYSTEM FAILED: $_"
            throw "Cannot create scheduled tasks as SYSTEM. Runner account ($([System.Security.Principal.WindowsIdentity]::GetCurrent().Name)) lacks required rights."
          }

      - name: "Create forest root DC (hvdc01 — azrl.mgmt)"
        shell: powershell
        run: |
          $invoker = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\common\Invoke-AsSystem.ps1"
          $script  = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\01-create-dc.ps1"
          & $invoker -ScriptPath $script -LogFile "C:\Temp\hvlab-01-create-dc.log" -TaskName "HVLab-01-CreateDC" -TimeoutMinutes 45 `
            -EnvVars @{ HVLAB_BOOTSTRAP_PASSWORD = 'HVLab@2026!' }

      - name: "Create iSCSI target server (hviscsi01)"
        shell: powershell
        run: |
          $invoker = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\common\Invoke-AsSystem.ps1"
          $script  = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\02-create-iscsi.ps1"
          & $invoker -ScriptPath $script -LogFile "C:\Temp\hvlab-02-create-iscsi.log" -TaskName "HVLab-02-CreateISCSI" -TimeoutMinutes 30 `
            -EnvVars @{ HVLAB_BOOTSTRAP_PASSWORD = 'HVLab@2026!' }

      - name: "Create Hyper-V cluster nodes (hvnode01-04)"
        shell: powershell
        run: |
          $invoker = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\common\Invoke-AsSystem.ps1"
          $script  = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\03-create-cluster-nodes.ps1"
          & $invoker -ScriptPath $script -LogFile "C:\Temp\hvlab-03-create-nodes.log" -TaskName "HVLab-03-CreateNodes" -TimeoutMinutes 60 `
            -EnvVars @{ HVLAB_BOOTSTRAP_PASSWORD = 'HVLab@2026!' }

      - name: "Create WAC vmode server (hvwac01 — WS2025)"
        shell: powershell
        run: |
          $invoker = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\common\Invoke-AsSystem.ps1"
          $script  = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\04-create-wac-vmode.ps1"
          & $invoker -ScriptPath $script -LogFile "C:\Temp\hvlab-04-create-wac.log" -TaskName "HVLab-04-CreateWAC" -TimeoutMinutes 30 `
            -EnvVars @{ HVLAB_BOOTSTRAP_PASSWORD = 'HVLab@2026!' }

      - name: "Create SCVMM server (hvscvmm01)"
        shell: powershell
        run: |
          $invoker = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\common\Invoke-AsSystem.ps1"
          $script  = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\05-create-scvmm.ps1"
          & $invoker -ScriptPath $script -LogFile "C:\Temp\hvlab-05-create-scvmm.log" -TaskName "HVLab-05-CreateSCVMM" -TimeoutMinutes 30 `
            -EnvVars @{ HVLAB_BOOTSTRAP_PASSWORD = 'HVLab@2026!' }

      - name: Summary
        shell: powershell
        run: |
          $invoker = "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\common\Invoke-AsSystem.ps1"
          $summaryScript = "C:\Temp\hvlab-summary.ps1"
          $content = '$vms = Get-VM | Select-Object Name, State, @{N="MemoryGB";E={[math]::Round($_.MemoryAssigned/1GB,1)}}, ProcessorCount; $vms | Format-Table | Out-String | Write-Host'
          Set-Content -Path $summaryScript -Value $content
          & $invoker -ScriptPath $summaryScript -LogFile "C:\Temp\hvlab-summary.log" -TaskName "HVLab-Summary" -TimeoutMinutes 5
          "## Nested VMs Created" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| VM | State | Memory | vCPU |" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "|---|---|---|---|" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "`n**Next step:** Run **HVLab 04 - Configure Failover Cluster**" | Out-File $env:GITHUB_STEP_SUMMARY -Append
