name: "HVLab 03 — Deploy Nested VMs"

on:
  workflow_dispatch:
  push:
    paths:
      - 'triggers/hvlab-03.trigger'
  workflow_run:
    workflows: ["HVLab 02b — Post-Bootstrap (ISOs + Arc)"]
    types: [completed]

jobs:
  deploy-nested-vms:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    name: Create all nested VMs
    runs-on: [self-hosted, hvlab-host01]
    steps:
      - uses: actions/checkout@v4

      - name: "Setup - verify runner identity and Hyper-V access"
        shell: powershell
        run: |
          $who = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          Write-Host "Runner identity: $who"
          $hvGroups = (New-Object System.Security.Principal.WindowsPrincipal(
            [System.Security.Principal.WindowsIdentity]::GetCurrent()
          )).IsInRole("Hyper-V Administrators")
          Write-Host "In Hyper-V Administrators: $hvGroups"
          Get-VMHost -EA SilentlyContinue | Select-Object Name,VirtualMachinePath,VirtualHardDiskPath | Format-List
          Write-Host "Setup OK"

      - name: "Create forest root DC (hvdc01 - azrl.mgmt)"
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\01-create-dc.ps1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: "Create iSCSI target server (hviscsi01)"
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\02-create-iscsi.ps1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: "Create Hyper-V cluster nodes (hvnode01-04)"
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\03-create-cluster-nodes.ps1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: "Create WAC vmode server (hvwac01 - WS2025)"
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\04-create-wac-vmode.ps1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: "Create SCVMM server (hvscvmm01)"
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\src\deployments\powershell-azurecli\nested-vms\05-create-scvmm.ps1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Summary
        shell: powershell
        run: |
          $vms = Get-VM -EA SilentlyContinue | Select-Object Name,State,ProcessorCount
          $vms | Format-Table | Out-String | Write-Host
          "## Nested VMs Created" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| VM | State | vCPU |" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "|---|---|---|" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          foreach ($vm in $vms) {
            "| $($vm.Name) | $($vm.State) | $($vm.ProcessorCount) |" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          }
          "`n**Next:** HVLab 04 - Configure Failover Cluster" | Out-File $env:GITHUB_STEP_SUMMARY -Append

